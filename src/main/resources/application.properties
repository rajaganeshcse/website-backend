spring.config.import=optional:file:.env[.properties]
spring.application.name=portfolio-backend
server.port=${PORT:8000}
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=75MB

app.mongodb-uri=${MONGODB_URI:}
app.admin-username=${ADMIN_USERNAME:}
app.admin-password=${ADMIN_PASSWORD:}
app.jwt-secret=${JWT_SECRET:}
app.client-url=${CLIENT_URL:https://rajaganeshcse.vercel.app,http://localhost:3000}
app.public-base-url=${PUBLIC_BASE_URL:${BACKEND_PUBLIC_URL:}}
app.upload-auto-delete-hours=${UPLOAD_AUTO_DELETE_HOURS:0}
app.upload-cleanup-interval-minutes=${UPLOAD_CLEANUP_INTERVAL_MINUTES:5}
app.cloudinary-cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary-api-key=${CLOUDINARY_API_KEY:}
app.cloudinary-api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary-folder=${CLOUDINARY_FOLDER:portfolio}
app.local-store-path=${LOCAL_STORE_PATH:src/data/localStore.json}
app.media-path=${MEDIA_PATH:media}
